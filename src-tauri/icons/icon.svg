<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b6bf0"/>
      <stop offset="100%" style="stop-color:#5a4bd4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="92" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="256" r="154" fill="none" stroke="white" stroke-width="24" opacity="0.95"/>
  <!-- Hour marks (12, 3, 6, 9 = thicker) -->
  <line x1="256" y1="126" x2="256" y2="95" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <line x1="386" y1="256" x2="417" y2="256" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <line x1="256" y1="386" x2="256" y2="417" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <line x1="126" y1="256" x2="95" y2="256" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Minor hour marks -->
  <line x1="317" y1="131" x2="327" y2="114" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="381" y1="195" x2="398" y2="185" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="381" y1="317" x2="398" y2="327" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="317" y1="381" x2="327" y2="398" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="195" y1="381" x2="185" y2="398" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="131" y1="317" x2="114" y2="327" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="131" y1="195" x2="114" y2="185" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="195" y1="131" x2="185" y2="114" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Hour hand (pointing to ~2) -->
  <line x1="256" y1="256" x2="294" y2="170" stroke="white" stroke-width="30" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~10 past) -->
  <line x1="256" y1="256" x2="350" y2="220" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="18" fill="white"/>
</svg>
